<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夏まつり 駐車場空き状況マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* 画面全体に地図を表示する設定 */
    body { margin: 0; padding: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    
    .popup-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; border-bottom: 2px solid #ccc; padding-bottom: 3px; }

    /* パネルのデザイン（スマホでも見やすいように） */
    #status-list-panel {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-height: 80%; overflow-y: auto;
      font-size: 13px; pointer-events: auto; width: 220px;
    }
    
    .panel-title { text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #333; }
    .toggle-btn { background-color: #2196f3; color: white; border: none; padding: 8px 10px; border-radius: 4px; text-align: center; font-weight: bold; cursor: pointer; font-size: 13px; margin-bottom: 5px; }
    #refresh-btn { background-color: #e9ecef; border: 1px solid #ccc; padding: 6px 10px; border-radius: 4px; text-align: center; font-weight: bold; cursor: pointer; font-size: 12px; color: #333; margin-top: 10px; }
    #refresh-btn:active { background-color: #ced4da; }
    
    #list-content { display: block; /* 最初から開いておく */ margin-top: 5px; }
    #total-status { display: block; text-align: center; font-size: 13px; font-weight: bold; color: #000; background-color: #e2f0d9; padding: 6px; border-radius: 4px; margin-bottom: 5px; }
    #update-time { display: block; text-align: center; font-size: 11px; color: #666; margin-bottom: 8px; border-bottom: 1px solid #ccc; padding-bottom: 6px; }
    
    table { width: 100%; border-collapse: collapse; }
    #status-table td { padding: 6px 5px; border-bottom: 1px dashed #eee; vertical-align: middle; }
    
    .status-text-blue { color: blue; font-weight: bold; }
    .status-text-orange { color: orange; font-weight: bold; }
    .status-text-red { color: red; font-weight: bold; }
  </style>
</head>
<body>
  
  <!-- 地図の表示エリア（全画面） -->
  <div id="map"></div>
  
  <!-- 右上の空き状況パネル -->
  <div id="status-list-panel">
    <div class="panel-title">🚗 駐車場 空き状況</div>
    <div id="list-content">
      <div id="total-status">全体：計算中...</div>
      <span id="update-time">(--:-- 時点)</span>
      <table id="status-table"></table>
    </div>
    <!-- 手動更新ボタン -->
    <div id="refresh-btn" onclick="updateData()">🔄 最新の情報に更新</div>
  </div>

  <script>
    // ライセンスフリーのOpenStreetMapを利用（一般公開用として最適）
    var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
    });

    var map = L.map('map', {
      center: [34.295261575345286, 135.51751990257273],
      zoom: 15,
      layers: [osmLayer]
    });

    // バックエンド（GAS）のURL
    var gasUrl = "https://script.google.com/macros/s/AKfycby31srJLpaJ8mVhonQMxIEQTQENDs-nYMBa9hNBoSV7uRjCF7n28CQOJu9YW14yFGGH/exec";
    
    var parkingLayer = L.layerGroup().addTo(map);

    function updateData() {
      var btn = document.getElementById('refresh-btn');
      if (btn) btn.innerText = "🔄 更新中...";

      // キャッシュ回避
      var timestamp = '_=' + new Date().getTime();
      var fetchUrl = gasUrl + (gasUrl.indexOf('?') > -1 ? '&' : '?') + timestamp;

      // 駐車場データのみを取得（スタッフデータは取得しない）
      fetch(fetchUrl)
        .then(res => res.json())
        .then(parkingData => {
          
          parkingLayer.clearLayers(); // 古いピンを一括消去
          var tableHtml = "";
          var totalCapacity = 0;
          var totalVacant = 0;

          parkingData.forEach(park => {
            if (!park.lat || !park.lng || isNaN(park.lat) || isNaN(park.lng)) return;

            var capacity = Number(park.capacity);
            var parkedRaw = park.status; 
            var color = 'blue';
            var currentStatus = "空きあり";
            var listStatusText = "";
            var textClass = 'status-text-blue';

            // 状況の判定
            if (parkedRaw === "未入力" || parkedRaw === "未報告" || parkedRaw === "") {
              currentStatus = "未入力";
              listStatusText = "<span style='color:gray; font-weight:normal;'>情報なし</span>";
              textClass = '';
              totalCapacity += capacity;
              totalVacant += capacity;
            } else {
              var parked = Number(parkedRaw);
              var rate = parked / capacity;
              totalCapacity += capacity;
              totalVacant += Number(park.vacant);

              if (rate >= 1.0) { 
                color = 'red'; currentStatus = "満車"; listStatusText = "満車"; textClass = 'status-text-red'; 
              } else if (rate >= 0.7) { 
                color = 'orange'; currentStatus = "混雑"; listStatusText = "混雑(空" + park.vacant + "台)"; textClass = 'status-text-orange'; 
              } else { 
                color = 'blue'; currentStatus = "空きあり"; listStatusText = "空" + park.vacant + "台"; textClass = 'status-text-blue'; 
              }
            }

            // マップ上のピン作成
            var marker = L.circleMarker([park.lat, park.lng], {
              color: color, fillColor: color, fillOpacity: 0.8, radius: 14 // 来場者向けに少し丸を大きく
            });

            // ポップアップの内容（シンプルに）
            var popupVacant = (currentStatus === "未入力") ? "情報なし" : park.vacant + "台";
            var popupContent = "<div class='popup-title'>" + park.name + "</div>" +
                               "<div style='font-size: 14px;'>状況：<b class='" + textClass + "'>" + currentStatus + "</b></div>" +
                               "<div style='font-size: 13px; margin-top: 4px;'>空き台数： " + popupVacant + " / " + park.capacity + "台</div>";

            marker.bindPopup(popupContent);
            parkingLayer.addLayer(marker);

            // リストの行作成
            tableHtml += "<tr><td>" + park.name + "</td><td class='" + textClass + "'>" + listStatusText + "</td></tr>";
          });

          // リストパネルの更新
          document.getElementById('status-table').innerHTML = tableHtml;

          var percent = 0;
          if (totalCapacity > 0) percent = Math.round((totalVacant / totalCapacity) * 100);
          document.getElementById('total-status').innerHTML = "全体：空" + totalVacant + "台 / " + totalCapacity + "台";

          var now = new Date();
          var hours = String(now.getHours()).padStart(2, '0');
          var minutes = String(now.getMinutes()).padStart(2, '0');
          document.getElementById('update-time').innerText = "(" + hours + ":" + minutes + " 更新)";
          
          if (btn) btn.innerText = "🔄 最新の情報に更新";
        })
        .catch(error => {
          console.error("更新エラー:", error);
          if (btn) btn.innerText = "🔄 最新の情報に更新";
        });
    }

    // 初回読み込みと1分ごとの自動更新
    updateData();
    setInterval(updateData, 60000);
  </script>
</body>
</html>
