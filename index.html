<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夏まつり駐車場 管理ダッシュボード</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* 画面分割のレイアウト */
    body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    
    #map-wrapper { position: relative; flex: 1; width: 100%; min-height: 45vh; }
    #map { width: 100%; height: 100%; }
    
    #form-area { flex: 1; width: 100%; min-height: 55vh; border-top: 3px solid #333; }
    iframe { width: 100%; height: 100%; border: none; }
    
    .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; }

    /* 一覧パネルのデザイン */
    #status-list-panel {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 8px; border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3); max-height: 80%; overflow-y: auto;
      font-size: 12px; pointer-events: auto;
    }
    
    /* ボタンのデザイン */
    #toggle-btn {
      background-color: #f8f9fa; border: 1px solid #ccc; padding: 6px 10px;
      border-radius: 4px; text-align: center; font-weight: bold; cursor: pointer;
      font-size: 13px; color: #333;
    }
    
    #refresh-btn {
      background-color: #e9ecef; border: 1px solid #ccc; padding: 6px 10px;
      border-radius: 4px; text-align: center; font-weight: bold; cursor: pointer;
      font-size: 13px; color: #333; margin-top: 5px;
    }
    #refresh-btn:active { background-color: #ced4da; }
    
    #list-content { display: none; margin-top: 10px; }
    #update-time { display: block; text-align: center; font-size: 10px; color: #666; margin-bottom: 5px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
    #status-list-panel table { width: 100%; border-collapse: collapse; }
    #status-list-panel td { padding: 4px 5px; border-bottom: 1px dashed #eee; vertical-align: middle; }
    
    .status-text-blue { color: blue; font-weight: bold; }
    .status-text-orange { color: orange; font-weight: bold; }
    .status-text-red { color: red; font-weight: bold; }
  </style>
</head>
<body>
  
  <div id="map-wrapper">
    <div id="map"></div>
    <div id="status-list-panel">
      <div id="toggle-btn" onclick="toggleList()">📋 空き状況一覧を開く</div>
      <div id="refresh-btn" onclick="loadParkingData()">🔄 今すぐ更新</div>
      
      <div id="list-content">
        <span id="update-time">(--:-- 時点)</span>
        <table id="status-table"></table>
      </div>
    </div>
  </div>

  <div id="form-area">
    <iframe src="https://forms.gle/JhWsFrFSXisuTKny9"></iframe>
  </div>

  <script>
    var map = L.map('map').setView([34.295261575345286, 135.51751990257273], 15);

    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
      attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>国土地理院</a>"
    }).addTo(map);

    // ★ GASのURLを組み込み済み
    var gasUrl = "https://script.google.com/macros/s/AKfycby31srJLpaJ8mVhonQMxIEQTQENDs-nYMBa9hNBoSV7uRjCF7n28CQOJu9YW14yFGGH/exec";
    var markers = [];

    function toggleList() {
      var content = document.getElementById('list-content');
      var btn = document.getElementById('toggle-btn');
      if (content.style.display === 'none' || content.style.display === '') {
        content.style.display = 'block';
        btn.innerText = '▼ 一覧を閉じる';
      } else {
        content.style.display = 'none';
        btn.innerText = '📋 空き状況一覧を開く';
      }
    }

    function loadParkingData() {
      // 視覚的フィードバック：押した瞬間に文字を変える
      var btn = document.getElementById('refresh-btn');
      if (btn) btn.innerText = "🔄 更新中...";

      // URLの末尾にタイムスタンプを付与し、ブラウザのキャッシュを強制的に回避する
      var fetchUrl = gasUrl + (gasUrl.indexOf('?') > -1 ? '&' : '?') + '_=' + new Date().getTime();

      fetch(fetchUrl)
        .then(response => {
          if (!response.ok) throw new Error("通信エラーが発生しました(ステータス: " + response.status + ")");
          return response.json();
        })
        .then(data => {
          markers.forEach(marker => map.removeLayer(marker));
          markers = [];
          var tableHtml = "";

          data.forEach(park => {
            if (!park.lat || !park.lng || isNaN(park.lat) || isNaN(park.lng)) return;

            var capacity = Number(park.capacity);
            var parkedRaw = park.status; 
            
            var color = 'blue';
            var currentStatus = "空きあり";
            var listStatusText = "";
            var textClass = 'status-text-blue';

            if (parkedRaw === "未入力" || parkedRaw === "未報告" || parkedRaw === "") {
              currentStatus = "未入力";
              listStatusText = "<span style='color:gray; font-weight:normal;'>未入力</span>";
              textClass = '';
            } else {
              var parked = Number(parkedRaw);
              var rate = parked / capacity;
              
              if (rate >= 1.0) {
                color = 'red';
                currentStatus = "満車";
                listStatusText = "満車";
                textClass = 'status-text-red';
              } else if (rate >= 0.7) {
                color = 'orange';
                currentStatus = "混雑";
                listStatusText = "混雑(空" + park.vacant + "台)";
                textClass = 'status-text-orange';
              } else {
                color = 'blue';
                currentStatus = "空きあり";
                listStatusText = "空" + park.vacant + "台";
                textClass = 'status-text-blue';
              }
            }

            var marker = L.circleMarker([park.lat, park.lng], {
              color: color, fillColor: color, fillOpacity: 0.8, radius: 12
            }).addTo(map);

            var popupVacant = (currentStatus === "未入力") ? "不明" : park.vacant + "台";
            var popupParked = (currentStatus === "未入力") ? "不明" : parkedRaw + "台";

            var popupContent = "<div class='popup-title'>" + park.name + "</div>" +
                               "現在の状況：<b>" + currentStatus + "</b><br>" +
                               "駐車可能台数：" + park.capacity + "台<br>" +
                               "現在の駐車： " + popupParked + "<br>" +
                               "現在の空き： <b>" + popupVacant + "</b>";

            marker.bindPopup(popupContent);
            markers.push(marker);

            tableHtml += "<tr><td>" + park.name + "</td><td class='" + textClass + "'>" + listStatusText + "</td></tr>";
          });

          document.getElementById('status-table').innerHTML = tableHtml;

          var now = new Date();
          var hours = String(now.getHours()).padStart(2, '0');
          var minutes = String(now.getMinutes()).padStart(2, '0');
          document.getElementById('update-time').innerText = "(" + hours + ":" + minutes + " 時点)";
          
          // 元の文字に戻す
          if (btn) btn.innerText = "🔄 今すぐ更新";
        })
        .catch(error => {
          console.error("エラー:", error);
          alert("データの読み込みに失敗しました。時間をおいて再度お試しください。\n原因: " + error.message);
          if (btn) btn.innerText = "🔄 今すぐ更新";
        });
    }

    loadParkingData();
    setInterval(loadParkingData, 60000);
  </script>
</body>
</html>
